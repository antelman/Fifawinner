name: עדכון תוצאות מונדיאל (כל שעה בחלון המשחקים)

on:
  schedule:
    # כל שעה עגולה בחלון 15:00–05:00 UTC — מכסה את כל גלי המשחקים (אמריקה/אירופה),
    # כך שכל משחק נתפס תוך ~שעה מסיומו. ריצה ריקה לא דוחפת קומיט (אין build ב-Netlify).
    - cron: "0 15-23 * * *"
    - cron: "0 0-5 * * *"
  workflow_dispatch: {}   # אפשר גם להריץ ידנית מלשונית Actions

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: משיכת תוצאות ועדכון המאגר
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}   # מפתח חינמי מ-football-data.org (תוצאה + מחצית)
          THESPORTSDB_KEY: ${{ secrets.THESPORTSDB_KEY }}        # אופציונלי — מבקיע-ראשון; נופל ל-"123" אם ריק
        run: node scripts/update-results.js

      - name: בדיקות שפיות
        run: node tests/sanity.js && node tests/smoke-ui.js && node tests/knockout.js

      - name: בניית גרסה עצמאית
        run: node scripts/build-standalone.js

      - name: Commit & Push אם יש שינוי
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "fifawinner-bot"
            git config user.email "actions@github.com"
            git add -A
            git commit -m "עדכון תוצאות אוטומטי ($(date -u +%Y-%m-%d\ %H:%M) UTC)"
            # דחיפה עמידה למרוץ: אם ריצה מקבילה (cron+ידני) דחפה בינתיים,
            # הדחיפה נדחית (non-fast-forward). מסנכרנים ברבייס ומנסים שוב.
            # הבלוקים האוטומטיים (RESULTS/KO) זהים בין ריצות (אותו מקור) —
            # רבייס על שינוי זהה נבלע, ולא מאבדים נתונים.
            for i in 1 2 3 4 5; do
              if git push; then echo "נדחפו עדכונים."; exit 0; fi
              echo "דחיפה נדחתה (ניסיון $i/5) — מסנכרן (rebase) ומנסה שוב..."
              git pull --rebase --autostash origin main || true
              sleep $((i * 2))
            done
            echo "❌ דחיפה נכשלה אחרי 5 ניסיונות."; exit 1
          else
            echo "אין שינוי — לא נדחף דבר."
          fi
