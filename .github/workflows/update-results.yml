name: עדכון תוצאות מונדיאל (שלוש פעמים ביום)

on:
  schedule:
    # 03:00, 11:00, 19:00 UTC — אחרי גלי המשחקים השונים (אמריקה/אירופה)
    - cron: "0 3 * * *"
    - cron: "0 11 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch: {}   # אפשר גם להריץ ידנית מלשונית Actions

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: משיכת תוצאות ועדכון המאגר
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}   # מפתח חינמי מ-football-data.org (תוצאה + מחצית)
          THESPORTSDB_KEY: ${{ secrets.THESPORTSDB_KEY }}        # אופציונלי — מבקיע-ראשון; נופל ל-"123" אם ריק
        run: node scripts/update-results.js

      - name: בדיקות שפיות
        run: node tests/sanity.js && node tests/smoke-ui.js

      - name: בניית גרסה עצמאית
        run: node scripts/build-standalone.js

      - name: Commit & Push אם יש שינוי
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "fifawinner-bot"
            git config user.email "actions@github.com"
            git add -A
            git commit -m "עדכון תוצאות אוטומטי ($(date -u +%Y-%m-%d\ %H:%M) UTC)"
            git push
            echo "נדחפו עדכונים."
          else
            echo "אין שינוי — לא נדחף דבר."
          fi
